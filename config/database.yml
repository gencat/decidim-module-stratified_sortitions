
# PostgreSQL. Versions 9.5 and up are supported.
#
# Install the pg driver:
#   gem install pg
# On OS X with Homebrew:
#   gem install pg -- --with-pg-config=/usr/local/bin/pg_config
# On OS X with MacPorts:
#   gem install pg -- --with-pg-config=/opt/local/lib/postgresql84/bin/pg_config
# On Windows:
#   gem install pg
#       Choose the win32 build.
#       Install PostgreSQL and put its /bin directory on your path.
#
# Configure Using Gemfile
# gem 'pg'
#
# On Linux, the 'host: "localhost"' line below should be commented out to avoid 'password required' error.
#
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch('DB_POOL', 5) %>
  host: <%= ENV.fetch('DB_HOST', 'localhost') %>
  port: <%= ENV.fetch('DB_PORT', 5432) %>

development:
  <<: *default
  min_messages: notice
  database: <%= ENV.fetch('DB_DATABASE', 'decidim_dev') %>
  username: <%= ENV.fetch('DB_USERNAME', 'postgres') %>
  password: <%= ENV.fetch('DB_PASSWORD', '') %>

test:
  <<: *default
  database: <%= ENV.fetch('TEST_DB_DATABASE', 'decidim_test') %>
  username: <%= ENV.fetch('TEST_DB_USERNAME', 'postgres') %>
  password: <%= ENV.fetch('TEST_DB_PASSWORD', '') %>

integration:
  <<: *default
  database: <%= ENV.fetch('DB_DATABASE', 'decidim_integration') %>
  username: <%= ENV.fetch('DB_USERNAME', 'postgres') %>
  password: <%= ENV.fetch('DB_PASSWORD', '') %>

preprod:
  <<: *default
  url: <%= ENV['DATABASE_URL'] %>

production:
  <<: *default
  url: <%= ENV['DATABASE_URL'] %>